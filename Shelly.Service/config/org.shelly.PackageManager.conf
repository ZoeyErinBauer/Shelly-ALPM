<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Only root can own the service name -->
  <policy user="root">
    <allow own="org.shelly.PackageManager"/>
  </policy>

  <!-- Allow any user to call methods on the service -->
  <policy context="default">
    <allow send_destination="org.shelly.PackageManager"/>
    <allow receive_sender="org.shelly.PackageManager"/>
  </policy>

</busconfig>
